# Android build — skips gracefully until the Gradle project exists
name: android
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.gradle_check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for Gradle project
        id: gradle_check
        run: |
          if [ -f gradlew ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; echo "No gradlew yet — skipping build (design-only repo state)."; fi

      - name: Set up JDK 17
        if: steps.gradle_check.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        if: steps.gradle_check.outputs.exists == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK + unit tests
        if: steps.gradle_check.outputs.exists == 'true'
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug testDebugUnitTest --no-daemon

      - name: Upload APK artifact
        if: steps.gradle_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: akari-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  # Boots the app on an emulator, walks every screen (SmokeTest), and uploads
  # screenshots — proof the app actually runs, not just compiles.
  smoke:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.exists == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            chmod +x gradlew
            ./gradlew connectedDebugAndroidTest --no-daemon
            mkdir -p screenshots
            adb exec-out run-as com.akari.app sh -c "cd files/screenshots && tar cf - ." > screenshots/shots.tar
            tar xf screenshots/shots.tar -C screenshots && rm screenshots/shots.tar

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: akari-screenshots
          path: screenshots/
          if-no-files-found: warn

      - name: Upload instrumented-test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: androidTest-report
          path: app/build/reports/androidTests/
          if-no-files-found: warn
