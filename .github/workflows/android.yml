# Android build — skips gracefully until the Gradle project exists
name: android
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.gradle_check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for Gradle project
        id: gradle_check
        run: |
          if [ -f gradlew ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; echo "No gradlew yet — skipping build (design-only repo state)."; fi

      - name: Set up JDK 17
        if: steps.gradle_check.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        if: steps.gradle_check.outputs.exists == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK + unit tests
        if: steps.gradle_check.outputs.exists == 'true'
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug testDebugUnitTest --no-daemon

      - name: Upload APK artifact
        if: steps.gradle_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: akari-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  # Boots the app on an emulator, walks every screen (SmokeTest), and uploads
  # screenshots — proof the app actually runs, not just compiles.
  smoke:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.exists == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          # additionalTestOutput: AGP itself pulls the screenshots off the
          # device after the run (the app is uninstalled post-test, so a
          # manual adb pull would find nothing).
          script: |
            chmod +x gradlew
            ./gradlew connectedDebugAndroidTest -Pandroid.enableAdditionalTestOutput=true --no-daemon

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: akari-screenshots
          path: app/build/outputs/connected_android_test_additional_output/
          if-no-files-found: warn

      - name: Upload instrumented-test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: androidTest-report
          path: app/build/reports/androidTests/
          if-no-files-found: warn

  # Publishes the debug APK from every green main build to a rolling GitHub
  # Release, so there's always a directly-downloadable APK under /releases.
  release:
    runs-on: ubuntu-latest
    needs: [build, smoke]
    if: needs.build.outputs.exists == 'true' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: akari-debug-apk

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=latest
          NOTES="Debug APK built from \`${GITHUB_SHA}\`.

          **Install:** download \`app-debug.apk\` on an Android phone (Android 9+), tap it, allow installing from this source.

          Debug builds seed demo data for review; a release build would start empty."
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --prerelease --title "Akari debug (latest main)" --notes "$NOTES"
          gh release upload "$TAG" app-debug.apk --clobber
          gh release edit "$TAG" --notes "$NOTES"
