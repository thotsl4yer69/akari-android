# Android build — skips gracefully until the Gradle project exists
name: android
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.gradle_check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for Gradle project
        id: gradle_check
        run: |
          if [ -f gradlew ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; echo "No gradlew yet — skipping build (design-only repo state)."; fi

      - name: Set up JDK 17
        if: steps.gradle_check.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        if: steps.gradle_check.outputs.exists == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK + unit tests
        if: steps.gradle_check.outputs.exists == 'true'
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug testDebugUnitTest --no-daemon

      - name: Build signed release APK + Play bundle (.aab)
        if: steps.gradle_check.outputs.exists == 'true'
        env:
          AKARI_KEYSTORE_B64: ${{ secrets.AKARI_KEYSTORE_BASE64 }}
          AKARI_KEYSTORE_PASSWORD: ${{ secrets.AKARI_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$AKARI_KEYSTORE_B64" ]; then echo "No signing secret — skipping release build."; exit 0; fi
          echo "$AKARI_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/akari.jks"
          AKARI_KEYSTORE="$RUNNER_TEMP/akari.jks" ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload debug APK artifact
        if: steps.gradle_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: akari-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload release APK artifact
        if: steps.gradle_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: akari-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Upload Play bundle artifact
        if: steps.gradle_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: akari-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

  # Boots the app on an emulator, walks every screen (SmokeTest), and uploads
  # screenshots — proof the app actually runs, not just compiles.
  smoke:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.exists == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          # additionalTestOutput: AGP itself pulls the screenshots off the
          # device after the run (the app is uninstalled post-test, so a
          # manual adb pull would find nothing).
          script: |
            chmod +x gradlew
            ./gradlew connectedDebugAndroidTest -Pandroid.enableAdditionalTestOutput=true --no-daemon

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: akari-screenshots
          path: app/build/outputs/connected_android_test_additional_output/
          if-no-files-found: warn

      - name: Upload instrumented-test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: androidTest-report
          path: app/build/reports/androidTests/
          if-no-files-found: warn

  # Publishes the debug APK from every green main build to a rolling GitHub
  # Release, so there's always a directly-downloadable APK under /releases.
  release:
    runs-on: ubuntu-latest
    needs: [build, smoke]
    if: needs.build.outputs.exists == 'true' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: akari-debug-apk
          path: debug

      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: akari-release-apk
          path: release

      - name: Download Play bundle artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: akari-release-aab
          path: bundle

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=latest
          mv release/app-release.apk akari.apk
          mv debug/app-debug.apk akari-demo.apk
          ASSETS="akari.apk akari-demo.apk"
          if [ -f bundle/app-release.aab ]; then mv bundle/app-release.aab akari.aab; ASSETS="$ASSETS akari.aab"; fi
          NOTES="Built from \`${GITHUB_SHA}\`.

          ## Install \`akari.apk\` — this is the app
          Starts empty, exactly as designed: onboarding, then your first morning check-in. Download it on an Android phone (Android 9+), tap it, allow installing from this source.

          \`akari-demo.apk\` is the design-review build (separate app, \"Akari (demo)\") pre-seeded with example days — for looking at screens, not for real use. They can be installed side by side."
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --prerelease --title "Akari (latest main)" --notes "$NOTES"
          gh release upload "$TAG" $ASSETS --clobber
          gh release delete-asset "$TAG" app-debug.apk --yes || true
          gh release edit "$TAG" --title "Akari (latest main)" --notes "$NOTES"
